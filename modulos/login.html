<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <h1>Modulo de Login</h1>
    <hr><br>
    <form action="">
        <label for="">Documento de Identidad: </label>
        <input type="text" id="cedula_cuidadania" required placeholder="Ingrese su Documento de identidad">
        <br>
        <label for="">Contraseña: </label>
        <input type="password" id="contrasena" required placeholder="Ingrese su Contraseña">
        <br>
        <button type="button" onclick="location.href='../index.html'">Volver al Inicio</button>
        <button type="submit">Ingresar</button>
    </form>
</body>
</html>
