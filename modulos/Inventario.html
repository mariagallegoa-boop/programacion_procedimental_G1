<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css" />
    <link rel="stylesheet" href="../css/inventario.css">
    <title>Inventario</title>
</head>

<body>
    <form>
        <div class="container">
            <h1>Modulo de Inventario</h1>
            <hr><br>
            <div class="field">
                <p class="control has-icons-left has-icons-right">
                    <input class="input" type="text" placeholder="Categoria:" id="categoria" required>
                    <span class="icon is-small is-right">
                        <i class="fas fa-check"></i>
                    </span>
                </p>
            </div>
            <div class="field">
                <p class="control has-icons-left">
                    <input class="input" type="number" placeholder="Codigo del Producto:" id="codigo_producto" required>
                    <span class="icon is-small is-left">
                        <i class="fas fa-lock"></i>
                    </span>
                </p>
            </div>

            <div class="field">
                <p class="control has-icons-left">
                    <input class="input" type="number" placeholder="Nombre del Producto:" id="nombre_producto" required>
                    <span class="icon is-small is-left">
                        <i class="fas fa-lock"></i>
                    </span>
                </p>
            </div>

            <div class="field">
                <p class="control has-icons-left">
                    <input class="input" type="number" placeholder="Descripcion del Producto:" id="descripcion_producto"
                        required>
                    <span class="icon is-small is-left">
                        <i class="fas fa-lock"></i>
                    </span>
                </p>
            </div>

            <div class="field">
                <p class="control has-icons-left">
                    <input class="input" type="number" placeholder="Cantidad de Productos:" id="cantidad_productos"
                        required>
                    <span class="icon is-small is-left">
                        <i class="fas fa-lock"></i>
                    </span>
                </p>
            </div>

            <div class="field">
                <p class="control has-icons-left">
                    <input class="input" type="number" placeholder="Precio Unitario:" id="precio_unitario" required>
                    <span class="icon is-small is-left">
                        <i class="fas fa-lock"></i>
                    </span>
                </p>
            </div>


            <div class="field">
                <p class="control has-icons-left">
                    <input class="input" type="number" placeholder="Provedor: " id="provedor" required>
                    <span class="icon is-small is-left">
                        <i class="fas fa-lock"></i>
                    </span>
                </p>
            </div>

            <hr><br>
            <div class="field">
                <p class="control">
                    <button class="button is-success">
                        Guardar
                    </button>
                </p>
                
            </div>
            <div class="field">
                <p class="control">
                    <button class="button is-danger" onclick="location.href='../index.html'">
                        Volver al inicio
                    </button>
                </p>
            </div>

        </div>
    </form>
</body>

</html>
