<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario</title>
</head>
<body>
    <h1>Modulo de Inventario</h1>
    <hr><br>
    <form action="">
        <label for="">Categoria: </label>
        <input type="text" id="categoria" required placeholder="Ingresa la categoria">
        <br>
        <label for="">Codigo del Producto: </label>
        <input type="number" id="codigo_producto" required placeholder="Ingrese el Codigo del Producto">
        <br>
        <label for="">Nombre del Producto: </label>
        <input type="text" id="nombre_producto" required placeholder="Ingrese el Nombre del Producto">
        <br>
        <label for="">Descripcion del Producto: </label>
        <input type="text" id="descripcion_producto" required placeholder="Ingrese la descripcion del Producto">
        <br>
        <label for="">Cantidad de Productos: </label>
        <input type="number" id="cantidad_productos" required placeholder="Ingrese la cantidad de los productos">
        <br>
        <label for="">Precio Unitario: </label>
        <input type="number" id="precio_unitario" required placeholder="Ingreese el Precio Unitario del Producto">
        <br>
        <label for="">Provedor: </label>
        <input type="text"" id="provedor" required placeholder="Ingreese el nombre del Provedor">
        <br>
        <button type="button" onclick="location.href='../index.html'">Volver al inicio</button>
        <button type="submit">Guardar </button>
    </form>
</body>
</html>
